image: python:3.12-slim

stages:
  - lint
  - test
  - development
  - production

lint:
  stage: lint
  before_script:
    - pip install uv
    - uv sync --frozen --all-groups
  script:
    - uv run ruff check .
    - uv run ruff format --check .
    - uv run mypy app/
  rules:
    - when: always

test:
  stage: test
  before_script:
    - pip install uv
    - uv sync --frozen --all-groups
  script:
    - uv run pytest --tb=short
  rules:
    - when: always

deploy-development:
  stage: development
  only:
    - dev
  script:
    - apt-get clean
    - apt-get -o Acquire::ForceIPv4=true update
    - apt-get install -y curl
    - curl -fsSL https://railway.app/install.sh | sh
    - RAILWAY_TOKEN=$RAILWAY_TOKEN railway up --service=$RAILWAY_SERVICE_NAME -d
  environment:
    name: development

deploy-production:
  stage: production
  image: python:3.12
  only:
    - main
  script:
    - apt-get clean
    - apt-get -o Acquire::ForceIPv4=true update
    - apt-get install -y curl
    - curl -fsSL https://railway.app/install.sh | sh
    - railway up --service=$RAILWAY_SERVICE_NAME -d
  environment:
    name: production
